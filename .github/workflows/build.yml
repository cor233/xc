name: Build EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install playwright
        pip install requests
        pip install tk
        playwright install chromium
        
    - name: 打包为EXE
      run: |
        pyinstaller --onefile --console --name "275听书网下载器" --add-data "C:\Users\runneradmin\AppData\Local\ms-playwright;playwright" downloader.py
        
    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: 275-downloader
        path: dist/*.exe
        retention-days: 30
        
    - name: 创建Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*.exe
        body: |
          ## 275听书网下载器 ${{ github.ref_name }}
          
          ### 使用方法：
          直接运行 exe 文件，使用图形界面操作
          
          ### 功能：
          - 搜索书籍
          - 热门推荐
          - 批量下载
