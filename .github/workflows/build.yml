name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt
      - name: Build with PyInstaller
        run: pyinstaller --onefile --windowed --name audiobook_downloader downloader.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: audiobook_downloader
          path: dist/audiobook_downloader.exe
