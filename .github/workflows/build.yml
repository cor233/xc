name: Build EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v3
      
    - name: 设置Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
        
    - name: 打包为EXE
      run: |
        pyinstaller --onefile --console --name "275听书网下载器" downloader.py
        
    - name: 上传构建产物
      uses: actions/upload-artifact@v3
      with:
        name: 275-downloader
        path: dist/*.exe
        
    - name: 创建Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*.exe
        body: |
          ## 275听书网下载器 ${{ github.ref_name }}
          
          ### 使用方法：
          1. 下载exe文件
          2. 打开命令行，运行：
          ```
          275听书网下载器.exe "https://m.i275.com/book/63.html"
          ```
          
          ### 参数说明：
          - `-o` 指定输出目录
          - `-w` 设置并发下载数
          - `-d` 设置请求延迟
          - `-s` 搜索关键词
