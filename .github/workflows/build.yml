name: 275听书网音频下载器打包

on:
  push:
    branches: [ main ]  # 推送到main分支触发
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 手动触发

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'  # 推荐3.8-3.10（兼容性最佳）
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pyinstaller
          pip freeze > requirements.txt

      - name: 打包为EXE
        run: |
          pyinstaller --onefile --windowed --name "275听书下载器" --icon=NONE --add-data "requirements.txt;." i275_audio_downloader.py
          # 参数说明：
          # --onefile：单文件打包
          # --windowed：无控制台窗口（GUI专用）
          # --name：EXE文件名
          # --icon：可自定义图标（替换为.ico文件路径）

      - name: 上传打包产物
        uses: actions/upload-artifact@v4
        with:
          name: 275听书下载器-Windows
          path: dist/275听书下载器.exe
          retention-days: 30  # 产物保留30天
