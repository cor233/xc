name: Build i275 EXE
on:
  push:
    branches: [ main ]
    paths:
      - 'i275/i275.py'
      - 'i275/requirements.txt'
      - '.github/workflows/build-exe.yml'
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r i275/requirements.txt
        pip install pyinstaller

    - name: 使用 PyInstaller 打包
      run: |
        cd i275
        pyinstaller --onefile --windowed --name "275AudioDownloader" i275.py

    - name: 上传 EXE 文件
      uses: actions/upload-artifact@v4
      with:
        name: 275AudioDownloader
        path: i275/dist/275AudioDownloader.exe
