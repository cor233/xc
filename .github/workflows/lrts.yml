name: 构建lrts

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        pip install requests beautifulsoup4 pyinstaller

    - name: 使用 PyInstaller 构建
      run: |
        pyinstaller --onefile --windowed --name lrts lrts.py

    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: lrts.exe
        path: dist/lrts.exe
