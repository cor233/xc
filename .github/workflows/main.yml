name: 听友FM下载器

on:
  # 手动触发（便于测试）
  workflow_dispatch:
    inputs:
      album_url:
        description: '专辑URL'
        required: true
        default: 'https://tingyou.fm/albums/2726598617'
      max_workers:
        description: '并发下载数'
        required: false
        default: '3'
      save_dir:
        description: '保存目录（相对路径）'
        required: false
        default: './downloads'
  # 可选：定时运行（每天凌晨2点）
  schedule:
    - cron: '0 2 * * *'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: 运行下载器
        run: |
          python tyfm.py \
            --url "${{ github.event.inputs.album_url }}" \
            --workers "${{ github.event.inputs.max_workers }}" \
            --output "${{ github.event.inputs.save_dir }}"
        # 如果是定时运行，需要提供默认参数或通过环境变量设置
        # 这里使用 workflow_dispatch 输入参数示例

      - name: 上传下载结果（可选）
        uses: actions/upload-artifact@v4
        with:
          name: downloads
          path: ./downloads/
