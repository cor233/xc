name: Build i275 Downloader

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 使用 PyInstaller 打包
        run: |
          pyinstaller --onefile --windowed --name "i275" --add-data "curl_cffi;curl_cffi" i275.py

      - name: 上传构建产物 (exe)
        uses: actions/upload-artifact@v4
        with:
          name: i275-downloader-windows
          path: dist/i275.exe
