name: Caiyun Sign-in

on:
  schedule:
    - cron: '0 8 * * *'   # 每天北京时间 8:00 运行
  workflow_dispatch:       # 允许手动触发

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests
      - name: Run sign-in
        env:
          PHONE: ${{ secrets.PHONE }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: python name: Caiyun Sign-in

