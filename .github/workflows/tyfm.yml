name: Build tyfm EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller requests pycryptodome
          # 如果还需要其他依赖，请在此添加

      - name: 打包成 EXE
        run: |
          pyinstaller --onefile `
            --name tyfm `
            --windowed `
            --hidden-import Crypto.Cipher.ChaCha20_Poly1305 `
            --hidden-import Crypto.Cipher.AES `
            --hidden-import Crypto.Random `
            --collect-all Crypto `
            tyfm.py

      - name: 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tyfm-exe
          path: dist/tyfm.exe
