name: Build tyfm EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller requests

      - name: 打包成 EXE
        run: |
          pyinstaller --onefile --name tyfm --windowed tyfm.py

      - name: 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tyfm-exe
          path: dist/tyfm.exe
