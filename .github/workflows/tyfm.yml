name: Build tyfm EXE

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller requests

      - name: 打包成 EXE
        run: |
          pyinstaller --onefile --name tyfm --windowed tyfm.py
          # 如果不需要控制台窗口，去掉 --windowed 即可显示命令行窗口

      - name: 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tyfm-exe
          path: dist/tyfm.exe
