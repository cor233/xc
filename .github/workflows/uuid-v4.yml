name: 打包 uuid-v4 EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 PyInstaller
        run: pip install pyinstaller

      - name: 构建可执行文件
        run: pyinstaller --onefile --windowed --name UUID-Generator uuid-v4/uuid-v4.py

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: UUID-Generator
          path: dist/UUID-Generator.exe
