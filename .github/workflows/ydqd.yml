name: 移动云盘自动签到

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ydqd
    steps:
      - uses: actions/checkout@v4
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 安装依赖
        run: pip install -r requirements.txt
      - name: 执行签到
        env:
          yunpan: ${{ secrets.YUNPAN_TOKEN }}
          yunpan_device_id: ${{ secrets.YUNPAN_DEVICE_ID }}
        run: python yunpan.py
