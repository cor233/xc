name: Build ytb EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 使用 PyInstaller 打包
        run: |
          pyinstaller -F -w --name "YuetingbaDownloader" ytb.py

      - name: 上传 EXE 文件 (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Yuetingba-Downloader-EXE
          path: dist/YuetingbaDownloader.exe
